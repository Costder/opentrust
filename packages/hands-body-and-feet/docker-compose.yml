services:
  hands-and-feet:
    image: ghcr.io/costder/opentrust/hands-and-feet:latest
    ports:
      - "3847:3847"
      - "25:25"
    volumes:
      - ~/.hands-and-feet:/data
    environment:
      - OPENTRUST_REGISTRY_URL=${OPENTRUST_REGISTRY_URL}
      - MOON_API_ENV=${MOON_API_ENV:-production}
      - HANDS_AND_FEET_PASSPHRASE=${HANDS_AND_FEET_PASSPHRASE}
      - BASE_RPC_URL=${BASE_RPC_URL:-https://mainnet.base.org}
      - POLYGON_RPC_URL=${POLYGON_RPC_URL:-https://polygon-rpc.com}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - MOON_CONSUMER_KEY=${MOON_CONSUMER_KEY:-}
      - MOON_CONSUMER_SECRET=${MOON_CONSUMER_SECRET:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - SIGNALWIRE_PROJECT_ID=${SIGNALWIRE_PROJECT_ID:-}
      - SIGNALWIRE_AUTH_TOKEN=${SIGNALWIRE_AUTH_TOKEN:-}
      - SIGNALWIRE_SPACE_URL=${SIGNALWIRE_SPACE_URL:-}
      - POSTMARK_SERVER_TOKEN=${POSTMARK_SERVER_TOKEN:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - POSTSCAN_API_KEY=${POSTSCAN_API_KEY:-}
      - POSTSCAN_ACCOUNT_ID=${POSTSCAN_ACCOUNT_ID:-}
      - IPFS_API_URL=${IPFS_API_URL:-http://localhost:5001}
      - XMPP_JID=${XMPP_JID:-}
      - XMPP_PASSWORD=${XMPP_PASSWORD:-}
    restart: unless-stopped
