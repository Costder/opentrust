services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opentrust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./passport-schema/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opentrust"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_URL: postgresql+asyncpg://postgres:postgres@db:5432/opentrust
      JWT_SECRET: change_me
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
    depends_on:
      - api
volumes:
  postgres_data:
