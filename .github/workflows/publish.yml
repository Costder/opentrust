name: Publish
on:
  push:
    tags:
      - "v*"
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance and PyPI trusted publishing
    steps:
      # Pin to SHA so a compromised @v4 tag cannot inject code into our publish pipeline
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Python packages via PyPI Trusted Publishing (OIDC — no stored token)
      - run: python -m pip install build twine
      - run: cd payment-contracts && python -m build
      - run: cd cli && python -m build
      # Uncomment once trusted publisher is configured at pypi.org:
      # - run: twine upload --repository pypi payment-contracts/dist/* cli/dist/*
      #   env:
      #     TWINE_USERNAME: __token__

      # npm package with provenance attestation
      # --provenance links this tarball to the exact commit + Actions run via Sigstore
      # Users can verify with: npm audit signatures @opentrust/sdk
      - run: cd web && npm ci --ignore-scripts && npm run build
      # Uncomment once package is ready:
      # - run: cd cli && npm publish --provenance --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
