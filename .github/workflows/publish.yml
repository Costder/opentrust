name: Publish
on:
  push:
    tags:
      - "v*"
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: python -m pip install build twine
      - run: cd payment-contracts && python -m build
      - run: cd cli && python -m build
      - run: cd sdk && python -m build
      - run: twine upload --repository pypi payment-contracts/dist/* cli/dist/* sdk/dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - run: cd web && npm ci --ignore-scripts && npm run build
      - run: cd sdk-ts && npm ci && npm run build
      - run: cd sdk-ts && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # hands-body-and-feet (the MCP server that gives agents real-world capabilities)
      - run: cd packages/hands-body-and-feet && npm ci && npm run build && npm run typecheck
      - run: cd packages/hands-body-and-feet && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
