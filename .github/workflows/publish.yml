name: Publish
on:
  push:
    tags:
      - "v*"
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install build twine
      - run: cd payment-contracts && python -m build
      - run: cd cli && python -m build
      - run: cd web && npm ci && npm run build
      - run: echo "Configure trusted publishing for PyPI and npm before enabling uploads."
