name: Dependency Review
on:
  pull_request:
    paths:
      - "web/package-lock.json"
      - "api/requirements.txt"
      - "cli/**"
      - "payment-contracts/**"
jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/dependency-review-action@da2fc0f2fd81c1c82e77d2fc53b4bb8db8c9beb0  # v4.7.1
        with:
          fail-on-severity: high
          # Deny any dep that has been published in the last 24h — zero tolerance
          # for brand-new packages in PRs (use Renovate's minimumReleaseAge for
          # automated updates; this catches manually added deps).
          deny-licenses: "AGPL-3.0, GPL-2.0, GPL-3.0"
          comment-summary-in-pr: always
