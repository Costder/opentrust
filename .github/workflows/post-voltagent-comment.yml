name: Post VoltAgent Comment

on:
  workflow_dispatch:

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post OpenTrust comment on VoltAgent issue 1166
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          COMMENT="Hey @uchibeke -- saw you are building Open Agent Passport at Aporth. OpenTrust is an open-source MCP passport standard that implements the same pre-call tool verification this issue describes.

We already wrote a VoltAgent integration spec: https://costder.github.io/opentrust/voltagent.html

Not competing -- OAP and OpenTrust could be complementary. Happy to compare notes or help wire the passport format into VoltAgent's before_tool_call hook. The $20 passport service at costder.github.io/opentrust/passport-service.html can get any MCP tool covered quickly."

          if [ -z "$GH_TOKEN" ]; then
            {
              echo "## Ready to post -- paste this at VoltAgent/voltagent#1166"
              echo ""
              echo "**Step 1:** Go to https://github.com/settings/tokens/new?scopes=public_repo&description=opentrust-voltagent"
              echo "**Step 2:** Generate token, copy it"
              echo "**Step 3:** Go to https://github.com/Costder/opentrust/settings/secrets/actions/new -- Name: GH_TOKEN, Value: paste token, Save"
              echo "**Step 4:** Come back here and click Re-run"
              echo ""
              echo "**OR paste this comment manually at https://github.com/VoltAgent/voltagent/issues/1166 :**"
              echo ""
              echo "$COMMENT"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "GH_TOKEN not set. Instructions written to Job Summary above."
            exit 0
          fi

          gh issue comment VoltAgent/voltagent#1166 --body "$COMMENT"
          echo "Comment posted successfully!"
