name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
      - run: python -m pip install -r api/requirements.txt
      - run: python -m pip install -e cli -e payment-contracts
      - run: pytest api/tests payment-contracts/tests cli/tests
      # Verify every entry in package-lock.json resolves from registry.npmjs.org only.
      # Blocks dependency confusion attacks where a transitive dep is pulled from a
      # different registry silently.
      - name: Lockfile registry check
        run: npx lockfile-lint --path web/package-lock.json --type npm --allowed-hosts npm --validate-https
      # Verify that every installed package has a valid Sigstore or registry signature.
      # Catches tampered packages that don't match what npm published.
      - name: Verify package signatures
        run: cd web && npm audit signatures
      - run: cd web && npm ci --ignore-scripts && npm run lint && npm run build
