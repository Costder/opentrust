name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
      - run: python -m pip install -e cli
      - run: python -m pip install -e "sdk[mcp]"
      - run: pytest cli/tests sdk/tests -v
      # Verify every entry in package-lock.json resolves from registry.npmjs.org only.
      - name: Lockfile registry check (sdk-ts)
        run: npx lockfile-lint --path sdk-ts/package-lock.json --type npm --allowed-hosts npm --validate-https
      - run: cd sdk-ts && npm ci --ignore-scripts
      - name: Verify package signatures (sdk-ts)
        run: cd sdk-ts && npm audit signatures
      - run: cd sdk-ts && npm run typecheck && npm test
      - name: Lockfile registry check (gateway)
        run: npx lockfile-lint --path packages/opentrust-gateway/package-lock.json --type npm --allowed-hosts npm --validate-https
      - run: cd packages/opentrust-gateway && npm ci && npm run typecheck && npm test && npm run build
