version: 2
updates:
  # Python deps still managed by Dependabot
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
  - package-ecosystem: pip
    directory: /cli
    schedule:
      interval: weekly
  # npm is managed by Renovate (see renovate.json) — it supports minimumReleaseAge
  # which prevents installing packages published less than N days ago (supply chain defense).
